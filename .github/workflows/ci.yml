name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: builder/go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: |
          cd builder
          test -z "$(gofmt -l .)" || (gofmt -d . && exit 1)
          go vet ./...
